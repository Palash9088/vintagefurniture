<body>
  <div class="banner_section">
    <div class="container">
      <script charset="utf-8" type="text/javascript" src="//js.hsforms.net/forms/embed/v2.js"></script>
      <script>
        hbspt.forms.create({
          portalId: "44178869",
          formId: "d913a33a-71c4-4f8d-9e53-baff8487a900",
          region: "na1"
        });
      </script>
      <div class="image-section">
        <img src="../images/banner-bg.png" alt="Banner">
      </div>
    </div>
  </div>

  <!-- Amplitude Identify Section -->
  <div style="padding: 20px; text-align: center;">
    <h2>Amplitude Identify User</h2>
    <button onclick="identifyAmplitudeUser()" class="btn btn-primary" style="margin: 5px;">Identify Random User</button>
    <div id="amplitude-identify-result" style="margin-top: 10px;"></div>
  </div>

  <!-- DataLayer Demo Section -->
  <div class="datalayer-demo-section" style="padding: 20px; text-align: center; background-color: #f9f9f9; margin-top: 20px;">
    <h2>DataLayer Demo Events</h2>
    <div style="margin-bottom: 20px;">
      <button onclick="pushDemoEvent('add_to_cart')" class="btn btn-primary" style="margin: 5px;">Add to Cart</button>
      <button onclick="pushDemoEvent('purchase')" class="btn btn-success" style="margin: 5px;">Purchase</button>
      <button onclick="pushDemoEvent('view_item')" class="btn btn-info" style="margin: 5px;">View Item</button>
      <button onclick="pushDemoEvent('sign_up')" class="btn btn-warning" style="margin: 5px;">Sign Up</button>
      <button onclick="pushDemoEvent('login')" class="btn btn-secondary" style="margin: 5px;">Login</button>
    </div>
    <div style="margin-top: 20px; padding: 20px; border-top: 1px solid #ddd;">
      <h3>Custom Event</h3>
      <input type="text" id="customEventInput" placeholder="Enter event name" style="padding: 8px; border-radius: 4px; border: 1px solid #ccc;">
      <button onclick="pushCustomEvent()" class="btn btn-dark" style="margin-left: 10px;">Push Custom Event</button>
    </div>
  </div>

  <script>
    var names = ['Alice', 'Bob', 'Charlie', 'David', 'Eve', 'Frank', 'Grace', 'Hannah', 'Ivy', 'Jack'];
    var lastNames = ['Wood', 'Parker', 'Stark', 'Hogan', 'Soni', 'Jain', 'Shrivastava', 'Yadav', 'Maharaj', 'Emma'];

    function identifyAmplitudeUser() {
      var idx = Math.floor(Math.random() * names.length);
      var userId = names[idx] + lastNames[idx] + '_' + Date.now();
      var email = names[idx] + '.' + lastNames[idx] + '@example.com';
      if (window.amplitude) {
        amplitude.getInstance().setUserId(userId);
        var identify = new amplitude.Identify();
        identify.set('email', email);
        identify.set('name', names[idx] + ' ' + lastNames[idx]);
        amplitude.getInstance().identify(identify);
        document.getElementById('amplitude-identify-result').textContent = 'Identified: ' + email;
        console.log('[Amplitude] Identified user:', userId);
      } else {
        alert('Amplitude not loaded yet. Try again in a moment.');
      }
    }

    window.dataLayer = window.dataLayer || [];

    function pushDemoEvent(eventName) {
      var eventData = { 'event': eventName, 'timestamp': new Date().toISOString() };
      if (eventName === 'add_to_cart') {
        eventData.ecommerce = { currency: "USD", value: 30.00, items: [{ item_id: "SKU_12345", item_name: "Vintage Chair", price: 30.00, quantity: 1 }] };
      } else if (eventName === 'purchase') {
        eventData.ecommerce = { transaction_id: "T_" + Math.floor(Math.random() * 10000), value: 55.00, currency: "USD", items: [{ item_id: "SKU_12345", item_name: "Vintage Chair", price: 30.00, quantity: 1 }, { item_id: "SKU_67890", item_name: "Antique Lamp", price: 25.00, quantity: 1 }] };
      } else if (eventName === 'view_item') {
        eventData.ecommerce = { items: [{ item_id: "SKU_12345", item_name: "Vintage Chair", price: 30.00, category: "Furniture" }] };
      } else if (eventName === 'sign_up') {
        eventData.method = "email";
      } else if (eventName === 'login') {
        eventData.method = "google";
      }
      window.dataLayer.push(eventData);
      if (window.amplitude) { amplitude.getInstance().logEvent(eventName, eventData); }
      console.log('Pushed event to dataLayer:', eventData);
      alert('Event "' + eventName + '" pushed to dataLayer!');
    }

    function pushCustomEvent() {
      var eventName = document.getElementById('customEventInput').value;
      if (eventName) {
        window.dataLayer.push({ 'event': eventName, 'timestamp': new Date().toISOString(), 'custom': true });
        if (window.amplitude) { amplitude.getInstance().logEvent(eventName); }
        console.log('Pushed custom event to dataLayer:', eventName);
        alert('Custom event "' + eventName + '" pushed to dataLayer!');
      } else {
        alert('Please enter an event name.');
      }
    }
  </script>
  <script src="js/jquery.min.js"></script>
  <script src="js/bootstrap.bundle.min.js"></script>
</body>

</html>
