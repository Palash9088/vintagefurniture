   <!-- Google tag (gtag.js) -->
    <script>
      function getDelayFromURL() {
        const params = new URLSearchParams(window.location.search);
        const delayParam = params.get("delay");
        const delay = parseInt(delayParam, 10);
        return !isNaN(delay) && delay >= 0 ? delay : Math.floor(Math.random() * 15000);
      }

      const delay = getDelayFromURL();
      console.log("[GTAG] Will load after", delay, "ms");

      setTimeout(() => {
        console.log("[GTAG] Injecting gtag.js...");

        const script = document.createElement("script");
        script.src = "https://www.googletagmanager.com/gtag/js?id=G-QFDGX25NC1";
        script.async = true;

        script.onload = function () {
          console.log("[GTAG] gtag.js loaded. Initializing gtag...");

          window.dataLayer = window.dataLayer || [];
          window.gtag = function () {
            window.dataLayer.push(arguments);
          };

          gtag("js", new Date());
          gtag("config", "G-QFDGX25NC1");
        };

        document.head.appendChild(script);
      }, delay);
    </script>

      .banner_section .image-section {
        text-align: center;
        margin-top: 12px;
      }

      .banner_section .image-section img {
        width: 300px;

        height: auto;
        display: inline-block;

  <body onload="myScript()">
    <!-- Google Tag Manager (noscript) -->

      <iframe
        src="https://www.googletagmanager.com/ns.html?id=GTM-KG9D677"
        height="0"
        width="0"

    <div class="wrapper">
      <div id="modeScreen" class="mode-screen">
        <h1>Chess</h1>
        <p>Choose game mode</p>
        <div class="mode-buttons">
          <button type="button" id="vsFriendBtn" class="mode-btn">
            <span class="mode-icon">👥</span>
            Vs Friend
          </button>
          <button type="button" id="vsAiBtn" class="mode-btn">
            <span class="mode-icon">🤖</span>
            Vs AI
          </button>
        </div>
      </div>

      <div id="gameScreen" class="game-screen hidden">
        <header class="header">
          <h1>Chess</h1>
          <div class="game-info">
            <span class="turn-label" id="turnLabel">White to move</span>
            <span class="mode-badge" id="modeBadge">Vs Friend</span>
            <button type="button" id="newGameBtn" class="btn">New Game</button>
            <button type="button" id="changeModeBtn" class="btn btn-ghost">Change Mode</button>
          </div>
        </header>

        <main class="game-container">
          <div id="board" class="board"></div>
          <div class="promotion-overlay hidden" id="promotionOverlay">
            <p>Promote pawn to:</p>
            <div class="promotion-pieces" id="promotionPieces"></div>
          </div>
        </main>

        <div id="gameOverOverlay" class="game-over-overlay hidden">
          <div class="game-over-box">
            <h2 id="gameOverTitle">Checkmate!</h2>
            <p id="gameOverMessage"></p>
            <button type="button" id="playAgainBtn" class="btn btn-large">Play Again</button>
          </div>
        </div>
      </div>
    </div>

    <div class="banner_section">
      <div class="container">

        <div class="image-section">
          <img src="../images/banner-bg.png" alt="Banner" />
        </div>
      </div>
    </div>

    <script src="script.js"></script>
    <script src="js/jquery.min.js"></script>
