  <style>
    body {
      flex-direction: column;
    }

    .hero-row {
      display: flex;
      flex-direction: row;
      align-items: flex-start;
      justify-content: center;
      flex-wrap: wrap;
      gap: 30px;
    }

    .banner_section {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
    }

    .banner_section .container {
      display: flex;
      flex-direction: row;
      justify-content: center;
      align-items: center;
      gap: 30px;
      flex-wrap: nowrap;
      width: 100%;
      max-width: 1100px;
    }

    .banner_section .image-section {
      order: 1;
      flex: 0 0 300px;
      align-self: center;
      text-align: center;
    }

    .banner_section .container > :not(.image-section) {
      order: 2;
    }

    .banner_section .image-section img {
      width: 300px;
      max-width: 100%;
      height: auto;
      display: block;
    }

    @media (max-width: 768px) {
      .banner_section .container {
        flex-direction: column;
        align-items: center;
        flex-wrap: wrap;
      }

      .banner_section .container > .image-section,
      .banner_section .container > :not(.image-section) {
        order: initial;
        width: 100%;
      }

      .banner_section .image-section img {
        margin: 0 auto;
      }
    }
  </style>
  <!-- VWO SmartCode not included (AB Tasty page) -->

<body>
  <div class="hero-row">
    <div class="wrapper">
      <div id="modeScreen" class="mode-screen">
        <h1>Chess</h1>
        <p>Choose game mode</p>
        <div class="mode-buttons">
          <button type="button" id="vsFriendBtn" class="mode-btn">
            <span class="mode-icon">👥</span>
            Vs Friend
          </button>
          <button type="button" id="vsAiBtn" class="mode-btn">
            <span class="mode-icon">🤖</span>
            Vs AI
          </button>
        </div>
      </div>

      <div id="gameScreen" class="game-screen hidden">
        <header class="header">
          <h1>Chess</h1>
          <div class="game-info">
            <span class="turn-label" id="turnLabel">White to move</span>
            <span class="mode-badge" id="modeBadge">Vs Friend</span>
            <button type="button" id="newGameBtn" class="btn">New Game</button>
            <button type="button" id="changeModeBtn" class="btn btn-ghost">Change Mode</button>
          </div>
        </header>

        <main class="game-container">
          <div id="board" class="board"></div>
          <div class="promotion-overlay hidden" id="promotionOverlay">
            <p>Promote pawn to:</p>
            <div class="promotion-pieces" id="promotionPieces"></div>
          </div>
        </main>

        <div id="gameOverOverlay" class="game-over-overlay hidden">
          <div class="game-over-box">
            <h2 id="gameOverTitle">Checkmate!</h2>
            <p id="gameOverMessage"></p>
            <button type="button" id="playAgainBtn" class="btn btn-large">Play Again</button>
          </div>
        </div>
      </div>
    </div>

    <div class="banner_section">
      <div class="container">
        <script charset="utf-8" type="text/javascript" src="//js.hsforms.net/forms/embed/v2.js"></script>
        <script>
          hbspt.forms.create({
            portalId: "44178869",
            formId: "d913a33a-71c4-4f8d-9e53-baff8487a900",
            region: "na1"
          });
        </script>
        <div class="image-section">
          <img src="../images/banner-bg.png" alt="Banner" />
        </div>
      </div>
    </div>

  <script>
    window.dataLayer = window.dataLayer || [];

    function pushDemoEvent(eventName) {
      var eventData = { 'event': eventName, 'timestamp': new Date().toISOString() };
      if (eventName === 'add_to_cart') {
        eventData.ecommerce = { currency: "USD", value: 30.00, items: [{ item_id: "SKU_12345", item_name: "Vintage Chair", price: 30.00, quantity: 1 }] };
      } else if (eventName === 'purchase') {
        eventData.ecommerce = { transaction_id: "T_" + Math.floor(Math.random() * 10000), value: 55.00, currency: "USD", items: [{ item_id: "SKU_12345", item_name: "Vintage Chair", price: 30.00, quantity: 1 }, { item_id: "SKU_67890", item_name: "Antique Lamp", price: 25.00, quantity: 1 }] };
      } else if (eventName === 'view_item') {
        eventData.ecommerce = { items: [{ item_id: "SKU_12345", item_name: "Vintage Chair", price: 30.00, category: "Furniture" }] };
      } else if (eventName === 'sign_up') {
        eventData.method = "email";
      } else if (eventName === 'login') {
        eventData.method = "google";
      }
      window.dataLayer.push(eventData);
      if (window.FS) { FS.event(eventName, eventData); }
      console.log('Pushed event to dataLayer:', eventData);
      alert('Event "' + eventName + '" pushed to dataLayer!');
    }

    function pushCustomEvent() {
      var eventName = document.getElementById('customEventInput').value;
      if (eventName) {
        window.dataLayer.push({ 'event': eventName, 'timestamp': new Date().toISOString(), 'custom': true });
        if (window.FS) { FS.event(eventName); }
        console.log('Pushed custom event to dataLayer:', eventName);
        alert('Custom event "' + eventName + '" pushed to dataLayer!');
      } else {
        alert('Please enter an event name.');
      }
    }
  </script>

  <script src="js/jquery.min.js"></script>
  <script src="js/bootstrap.bundle.min.js"></script>
</body>
