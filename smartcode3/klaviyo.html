  <!-- Start VWO Async V3.0 SmartCode -->
<link rel="preconnect" href="https://dev.visualwebsiteoptimizer.com" />
<script type="text/javascript" id="vwoCode">
    const params_id = new URLSearchParams(window.location.search);
      const accId = parseInt(params_id.get("id"));
      const accountId = accId || 736554;
window._vwo_code || (function() {        
    var account_id = accountId;
        version = 3.0,
        settings_tolerance = 2000,
        hide_element = 'body',
        hide_element_style =
        'opacity:0 !important;filter:alpha(opacity=0) !important;background:none !important;transition:none !important';
    /* DO NOT EDIT BELOW THIS LINE */
    var w = window,
        d = document;
    if (d.URL.indexOf('__vwo_disable__') > -1 || w._vwo_code) return;
    var f = false,
        v = d.currentScript,
		cc = {sT: settings_tolerance, hES: hide_element_style, hE: hide_element};

	try {
		cc = Object.assign(JSON.parse( localStorage.getItem('_vwo_' + account_id + '_config')), cc);
	} catch (e) {} 
    var code = {
        nonce: v && v.nonce,

        settings_tolerance: function() {
            return cc.sT;
        },

        hide_element: function() {
            return performance.getEntriesByName('first-contentful-paint')[0] ? '' : cc.hE;
        },

        hide_element_style: function() {
            return '{' + cc.hES + '}';
        },

        getVersion: function() {
            return version;
        },

        finish: function() {
            if (f) return;
            f = true;
            var el = d.getElementById('_vis_opt_path_hides');
            if (el && el.parentNode) el.parentNode.removeChild(el);
        },

        finished: function() {
            return f;
        },

        addScript: function(src) {
            var s = d.createElement('script');
            s.type = 'text/javascript';
            s.src = src;
            if (v && v.nonce) s.setAttribute('nonce', v.nonce);
            d.getElementsByTagName('head')[0].appendChild(s);
        },

        init: function() {
            w._vwo_settings_timer = setTimeout(function() {
                code.finish();
            }, this.settings_tolerance());

            var styleEl = d.createElement('style');
              styleEl.setAttribute('id', '_vis_opt_path_hides');
              styleEl.type = 'text/css';
              if (code && code.nonce) styleEl.setAttribute('nonce', code.nonce);
              styleEl.appendChild(
                    d.createTextNode(this.hide_element() + this.hide_element_style())
                );
              d.head.appendChild(styleEl);

            // Keep only script loading
            this.addScript(
                'https://dev.visualwebsiteoptimizer.com/' +
                account_id +
                '.js'
            );
        }
    };

    w._vwo_code = code;
    code.init();
})();
</script> 
<!--End VWO Async SmartCode -->

  <!-- Klaviyo delayed loader: delay can be set via ?delay=ms -->
  <script>
    function getDelayFromURL() {
      const params = new URLSearchParams(window.location.search);
      const delayParam = params.get("delay");
      const delay = parseInt(delayParam, 10);
      return !isNaN(delay) && delay >= 0 ? delay : Math.floor(Math.random() * 15000);
    }

    var delay = getDelayFromURL();
    console.log("[Klaviyo] Using delay of", delay, "ms");

    setTimeout(function () {
      console.log("[Klaviyo] Starting script load after", delay, "ms delay");
      var script = document.createElement('script');
      script.type = 'text/javascript';
      script.async = true;
      script.src = 'https://static.klaviyo.com/onsite/js/klaviyo.js?company_id=VrcMRY';
      document.head.appendChild(script);
    }, delay);
  </script>

  <!-- Klaviyo identify utility and autorun -->
<script>
  // ------------ Random profile + VWO UUID helpers ------------
  const FIRST_NAMES = ['Ava', 'Ben', 'Chloe', 'Drew', 'Ella', 'Finn', 'Gia', 'Hank'];
  const LAST_NAMES = ['Stone', 'Lee', 'Patel', 'Garcia', 'Kim', 'Nguyen', 'Lopez', 'Wright'];
  const INDIAN_CITIES = ['Mumbai', 'Delhi', 'Bengaluru', 'Chennai', 'Kolkata', 'Hyderabad', 'Pune', 'Ahmedabad'];

  function randomFrom(arr) {
    return arr[Math.floor(Math.random() * arr.length)];
  }

  function buildRandomProfile() {
    const first = randomFrom(FIRST_NAMES);
    const last = randomFrom(LAST_NAMES);
    const ts = Date.now();
    const email = `${first}.${last}.${ts}@example.com`.toLowerCase();
    const phone = '+91' + Math.floor(6000000000 + Math.random() * 3000000000);
    const city = randomFrom(INDIAN_CITIES);
    return {
      $email: email,
      $first_name: first,
      $last_name: last,
      phone: phone,
      title: 'Vintage Furniture Fan',
      city: city,
      country: 'India'
    };
  }

  function getVwoUuidFromCookie() {
    const match = document.cookie.match(/(?:^|;\s*)_vwo_uuid=([^;]+)/);
    return match ? decodeURIComponent(match[1]) : null;
  }

  function getVwoUuidFromDataStore() {
    try {
      return window.VWO && window.VWO._ && window.VWO._.allSettings &&
        window.VWO._.allSettings.dataStore &&
        window.VWO._.allSettings.dataStore.uuid
        ? window.VWO._.allSettings.dataStore.uuid
        : null;
    } catch (e) {
      console.warn('Error reading VWO dataStore uuid', e);
      return null;
    }
  }

  function resolveVwoUUID() {
    return getVwoUuidFromCookie() || getVwoUuidFromDataStore() || null;
  }

  function alreadyIdentified(uuid) {
    const stored = sessionStorage.getItem('kl_identified_uuid');
    return stored && stored === uuid;
  }

  function rememberIdentification(uuid, email) {
    if (uuid) sessionStorage.setItem('kl_identified_uuid', uuid);
    if (email) sessionStorage.setItem('kl_identified_email', email);
  }

  // ------------ Identify flow ------------
  function identifyRandomUser(opts) {
    const options = opts || {};
    const vwoUuid = resolveVwoUUID();

    // If we require a VWO UUID but it's missing, log and skip unless forced
    if (!vwoUuid && !options.force) {
      console.warn('[Klaviyo] No VWO UUID found in cookie or dataStore; identification skipped.');
      return;
    }

    // Avoid duplicate identify with the same UUID
    if (!options.force && vwoUuid && alreadyIdentified(vwoUuid)) {
      console.log('[Klaviyo] Skip identify; UUID already identified', vwoUuid);
      return;
    }

    const profile = buildRandomProfile();
    if (vwoUuid) {
      profile.vwo_uuid = vwoUuid;
    }

    // Ensure Klaviyo queues exist
    window._learnq = window._learnq || [];
    window.klaviyo = window.klaviyo || [];

    // Legacy Klaviyo queue
    window._learnq.push(['identify', profile]);

    // New Klaviyo SDK if present
    if (typeof window.klaviyo !== 'undefined' && window.klaviyo.push) {
      window.klaviyo.push(['identify', profile]);
    }

    rememberIdentification(vwoUuid || 'no-uuid', profile.$email);

    console.log('[Klaviyo] Identified user', {
      email: profile.$email,
      vwo_uuid: vwoUuid || 'not available',
      time: new Date().toISOString()
    });
  }

  // Run when DOM is ready
  document.addEventListener('DOMContentLoaded', function () {
    var btn = document.getElementById("identifyUserBtn");

    if (btn) {
      btn.addEventListener("click", identifyRandomUser);
    }

    // Autorun once per browser (only if we have a UUID)
    identifyRandomUser();
  });
</script>
