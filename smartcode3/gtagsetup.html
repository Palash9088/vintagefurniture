   <script>
      function getDelayFromURL() {
         const params = new URLSearchParams(window.location.search);
         const delayParam = params.get("delay");
         const delay = parseInt(delayParam, 10);
         return !isNaN(delay) && delay >= 0 ? delay : Math.floor(Math.random() * 15000);
      }

      const delay = getDelayFromURL();
      console.log("[GTAG] Will load after", delay, "ms");

      setTimeout(() => {
         console.log("[GTAG] Injecting gtag.js...");

         // Create and inject the script tag
         const script = document.createElement("script");
         script.src = "https://www.googletagmanager.com/gtag/js?id=G-QFDGX25NC1";
         script.async = true;

         script.onload = function () {
            console.log("[GTAG] gtag.js loaded. Initializing gtag...");

            window.dataLayer = window.dataLayer || [];
            window.gtag = function () {
               window.dataLayer.push(arguments);
            };

            gtag('js', new Date());
            gtag('config', 'G-QFDGX25NC1');
         };

         document.head.appendChild(script);
      }, delay);
   </script>

         addScript: function(src) {
             var s = d.createElement('script');
             s.type = 'text/javascript';
             s.src = src;
             if (v && v.nonce) s.setAttribute('nonce', v.nonce);
             d.getElementsByTagName('head')[0].appendChild(s);
         },
 
         init: function() {
             w._vwo_settings_timer = setTimeout(function() {

                     d.createTextNode(this.hide_element() + this.hide_element_style())
