<script type="text/javascript" id="vwoCode">
    const params_id = new URLSearchParams(window.location.search);
      const accId = parseInt(params_id.get("id"));
      const accountId = accId || 4001465;
window._vwo_code || (function() {        
    var account_id = accountId;
        version = 3.0,
        settings_tolerance = 2000,
        hide_element = 'body',
        hide_element_style =
        'opacity:0 !important;filter:alpha(opacity=0) !important;background:none !important;transition:none !important';
    /* DO NOT EDIT BELOW THIS LINE */
    var w = window,
        d = document;
    if (d.URL.indexOf('__vwo_disable__') > -1 || w._vwo_code) return;
    var f = false,
        v = d.currentScript,
		cc = {sT: settings_tolerance, hES: hide_element_style, hE: hide_element};

	try {
		cc = Object.assign(JSON.parse( localStorage.getItem('_vwo_' + account_id + '_config')), cc);
	} catch (e) {} 
    var code = {
        nonce: v && v.nonce,

        settings_tolerance: function() {
            return cc.sT;
        },

        hide_element: function() {
            return performance.getEntriesByName('first-contentful-paint')[0] ? '' : cc.hE;
        },

        hide_element_style: function() {
            return '{' + cc.hES + '}';
        },

        getVersion: function() {
            return version;
        },

        finish: function() {
            if (f) return;
            f = true;
            var el = d.getElementById('_vis_opt_path_hides');
            if (el && el.parentNode) el.parentNode.removeChild(el);
        },

        finished: function() {
            return f;
        },

        addScript: function(src) {
            var s = d.createElement('script');
            s.type = 'text/javascript';
            s.src = src;
            if (v && v.nonce) s.setAttribute('nonce', v.nonce);
            d.getElementsByTagName('head')[0].appendChild(s);
        },

        init: function() {
            w._vwo_settings_timer = setTimeout(function() {
                code.finish();
            }, this.settings_tolerance());

            var styleEl = d.createElement('style');
              styleEl.setAttribute('id', '_vis_opt_path_hides');
              styleEl.type = 'text/css';
              if (code && code.nonce) styleEl.setAttribute('nonce', code.nonce);
              styleEl.appendChild(
                    d.createTextNode(this.hide_element() + this.hide_element_style())
                );
              d.head.appendChild(styleEl);

            // Keep only script loading
            this.addScript(
                'https://dev.visualwebsiteoptimizer.com/cloud-run-test/final/' +
                account_id +
                '.js'
            );
        }
    };

    w._vwo_code = code;
    code.init();
})();

      </div>
   </div>

   <script>
      // Ensure dataLayer exists
      window.dataLayer = window.dataLayer || [];

      function pushDemoEvent(eventName) {
         var eventData = {
            'event': eventName,
            'timestamp': new Date().toISOString()
         };

         // Add demo properties based on event type
         if (eventName === 'add_to_cart') {
            eventData.ecommerce = {
               currency: "USD",
               value: 30.00,
               items: [{
                  item_id: "SKU_12345",
                  item_name: "Vintage Chair",
                  price: 30.00,
                  quantity: 1
               }]
            };
         } else if (eventName === 'purchase') {
            eventData.ecommerce = {
               transaction_id: "T_" + Math.floor(Math.random() * 10000),
               value: 55.00,
               currency: "USD",
               items: [{
                  item_id: "SKU_12345",
                  item_name: "Vintage Chair",
                  price: 30.00,
                  quantity: 1
               }, {
                  item_id: "SKU_67890",
                  item_name: "Antique Lamp",
                  price: 25.00,
                  quantity: 1
               }]
            };
         } else if (eventName === 'view_item') {
            eventData.ecommerce = {
               items: [{
                  item_id: "SKU_12345",
                  item_name: "Vintage Chair",
                  price: 30.00,
                  category: "Furniture"
               }]
            };
         } else if (eventName === 'sign_up') {
            eventData.method = "email";
         } else if (eventName === 'login') {
            eventData.method = "google";
         }

         window.dataLayer.push(eventData);
         console.log('Pushed event to dataLayer:', eventData);
         alert('Event "' + eventName + '" pushed to dataLayer with props!');
      }

      function pushCustomEvent() {
         var eventName = document.getElementById('customEventInput').value;
         if (eventName) {
            window.dataLayer.push({
               'event': eventName,
               'timestamp': new Date().toISOString(),
               'custom': true
            });
            console.log('Pushed custom event to dataLayer:', eventName);
            alert('Custom event "' + eventName + '" pushed to dataLayer!');
         } else {
            alert('Please enter an event name.');
         }
      }
   </script>
