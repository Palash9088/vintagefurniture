    <script>
        window.eulerianToVWO = null; // Attach to the global scope

        function checkEulerianData() {
            if (!window.eulerianToVWO) {
                window.eulerianToVWO = {
                    audiences: {
                        "Vwotesting": "Vwotesting - segment",
                        "First visit": "First visit - segment",
                        "VWO-Palash-Test": "VWO-Palash-Test - segment",
                        "Device": "Desktop - segment"
                    }
                };
                console.log('Eulerian data updated:', window.eulerianToVWO);
                return true;
            }
            return false;
        }

        const pollInterval = 10; // 10ms
        const pollDuration = 10000; // 10 seconds
        const startTime = Date.now();

        const pollTimer = setInterval(() => {
            if (checkEulerianData() || Date.now() - startTime >= pollDuration) {
                clearInterval(pollTimer);
                console.log('Polling completed');
            }
        }, pollInterval);
    </script>
