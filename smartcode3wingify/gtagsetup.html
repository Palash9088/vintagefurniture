   <!-- Google tag (gtag.js) -->
   <script>
      function getDelayFromURL() {
         const params = new URLSearchParams(window.location.search);
         const delayParam = params.get("delay");
         const delay = parseInt(delayParam, 10);
         return !isNaN(delay) && delay >= 0 ? delay : Math.floor(Math.random() * 15000);
      }

      const delay = getDelayFromURL();
      console.log("[GTAG] Will load after", delay, "ms");

      setTimeout(() => {
         console.log("[GTAG] Injecting gtag.js...");

         // Create and inject the script tag
         const script = document.createElement("script");
         script.src = "https://www.googletagmanager.com/gtag/js?id=G-QFDGX25NC1";
         script.async = true;

         script.onload = function () {
            console.log("[GTAG] gtag.js loaded. Initializing gtag...");

            window.dataLayer = window.dataLayer || [];
            window.gtag = function () {
               window.dataLayer.push(arguments);
            };

            gtag('js', new Date());
            gtag('config', 'G-QFDGX25NC1');
         };

         document.head.appendChild(script);
      }, delay);
   </script>
