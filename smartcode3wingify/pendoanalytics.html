        function getDelayFromURL() {
            const params = new URLSearchParams(window.location.search);
            const delayParam = params.get("delay");
            const delay = parseInt(delayParam, 10);
            return !isNaN(delay) && delay >= 0 ? delay : Math.floor(Math.random() * 15000);
        }

        var delay = getDelayFromURL();
        console.log("[Pendo] Using delay of", delay, "ms");

        setTimeout(function () {
            console.log("[Pendo] Starting script load after", delay, "ms delay");
            (function (apiKey) {
                function generateRandomId(length) {
                    const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789';
                    let result = '';
                    for (let i = 0; i < length; i++) {
                        result += chars.charAt(Math.floor(Math.random() * chars.length));

                // Generate random visitor and account IDs

                const accountId = generateRandomId(8);   // 8-character random ID

                pendo.initialize({
                    visitor: {
                        id: visitorId // Random visitor ID
                    },
                    account: {
                        id: accountId // Random account ID
                    }
