<script>
(function () {

  script.async = true;

  document.head.appendChild(script);
})();
</script>

  <!-- Klaviyo delayed loader: delay can be set via ?delay=ms -->
  <script>
    function getDelayFromURL() {
      const params = new URLSearchParams(window.location.search);
      const delayParam = params.get("delay");
      const delay = parseInt(delayParam, 10);
      return !isNaN(delay) && delay >= 0 ? delay : Math.floor(Math.random() * 15000);
    }

    var delay = getDelayFromURL();
    console.log("[Klaviyo] Using delay of", delay, "ms");

    setTimeout(function () {
      console.log("[Klaviyo] Starting script load after", delay, "ms delay");
      var script = document.createElement('script');
      script.type = 'text/javascript';
      script.async = true;
      script.src = 'https://static.klaviyo.com/onsite/js/klaviyo.js?company_id=VrcMRY';
      document.head.appendChild(script);
    }, delay);
  </script>

  <!-- Klaviyo identify utility and autorun -->
<script>
  // ------------ Random profile + Wingify UUID helpers ------------
  const FIRST_NAMES = ['Ava', 'Ben', 'Chloe', 'Drew', 'Ella', 'Finn', 'Gia', 'Hank'];
  const LAST_NAMES = ['Stone', 'Lee', 'Patel', 'Garcia', 'Kim', 'Nguyen', 'Lopez', 'Wright'];
  const INDIAN_CITIES = ['Mumbai', 'Delhi', 'Bengaluru', 'Chennai', 'Kolkata', 'Hyderabad', 'Pune', 'Ahmedabad'];

  function randomFrom(arr) {
    return arr[Math.floor(Math.random() * arr.length)];
  }

  function buildRandomProfile() {
    const first = randomFrom(FIRST_NAMES);
    const last = randomFrom(LAST_NAMES);
    const ts = Date.now();
    const email = `${first}.${last}.${ts}@wingify.com`.toLowerCase();
    const phone = '+91' + Math.floor(6000000000 + Math.random() * 3000000000);
    const city = randomFrom(INDIAN_CITIES);
    return {
      $email: email,
      $first_name: first,
      $last_name: last,
      phone: phone,
      title: 'Vintage Furniture Fan',
      city: city,
      country: 'India'
    };
  }

  function resolveWingifyUUID() {
    try {
      return window.Wingify && window.Wingify._ && window.Wingify._.libUtils &&
        window.Wingify._.libUtils.uuid
        ? window.Wingify._.libUtils.uuid
        : null;
    } catch (e) {
      console.warn('[Klaviyo] Error reading Wingify UUID', e);
      return null;
    }
  }

  function alreadyIdentified(uuid) {
    const stored = sessionStorage.getItem('kl_identified_uuid');
    return stored && stored === uuid;
  }

  function rememberIdentification(uuid, email) {
    if (uuid) sessionStorage.setItem('kl_identified_uuid', uuid);
    if (email) sessionStorage.setItem('kl_identified_email', email);
  }

  // ------------ Identify flow ------------
  function identifyRandomUser(opts) {
    const options = opts || {};
    const wingifyUuid = resolveWingifyUUID();

    if (!wingifyUuid && !options.force) {
      console.warn('[Klaviyo] No Wingify UUID found (Wingify._.libUtils.uuid); identification skipped.');
      return false;
    }

    if (!options.force && wingifyUuid && alreadyIdentified(wingifyUuid)) {
      console.log('[Klaviyo] Skip identify; UUID already identified', wingifyUuid);
      return false;
    }

    const profile = buildRandomProfile();
    if (wingifyUuid) {
      profile.wingify_uuid = wingifyUuid;
    }

    window._learnq = window._learnq || [];
    window.klaviyo = window.klaviyo || [];

    window._learnq.push(['identify', profile]);

    if (typeof window.klaviyo !== 'undefined' && window.klaviyo.push) {
      window.klaviyo.push(['identify', profile]);
    }

    rememberIdentification(wingifyUuid || 'no-uuid', profile.$email);

    console.log('[Klaviyo] Identified user', {
      email: profile.$email,
      wingify_uuid: wingifyUuid || 'not available',
      time: new Date().toISOString()
    });
    return true;
  }

  function autorunIdentifyWhenReady() {
    if (identifyRandomUser()) {
      return;
    }

    var attempts = 0;
    var timer = setInterval(function () {
      attempts++;
      if (identifyRandomUser()) {
        clearInterval(timer);
      } else if (attempts >= 50) {
        clearInterval(timer);
        console.warn('[Klaviyo] Wingify UUID not available after waiting; identification skipped.');
      }
    }, 100);
  }

  document.addEventListener('DOMContentLoaded', function () {
    var btn = document.getElementById('identifyUserBtn');

    if (btn) {
      btn.addEventListener('click', identifyRandomUser);
    }

    autorunIdentifyWhenReady();
  });
</script>
