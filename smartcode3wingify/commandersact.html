<!-- Commanders Act: random tc_vars data layer (runs before VWO) -->
    <script>
        const CA_STORAGE_KEY = '_commandersActVars_v6';

        const SEGMENT_POOL = [
            { name: 'VIP_Prospects', id: '27ADB1DB' },
            { name: 'New_Customers', id: '8D7C4F70' },
            { name: 'Enterprise_Buyers', id: 'F92C4F26' },
            { name: 'SMB_Users', id: 'BBFAC450' },
            { name: 'Returning_Visitors', id: '3DCC6A0A' }
        ];

        const randomFrom = arr => Array.isArray(arr) && arr.length > 0 ? arr[Math.floor(Math.random() * arr.length)] : null;
        const randomNumber = (min, max) => Math.floor(Math.random() * (max - min + 1)) + min;

        function toSegmentJsonString(value) {
            if (typeof value === 'string') {
                try {
                    const parsed = JSON.parse(value);
                    if (parsed && typeof parsed === 'object' && !Array.isArray(parsed)) {
                        return JSON.stringify(parsed);
                    }
                } catch (error) {
                    return null;
                }
            }

            if (value && typeof value === 'object' && !Array.isArray(value)) {
                return JSON.stringify(value);
            }

            return null;
        }

        function isValidSegmentJsonString(value) {
            return typeof toSegmentJsonString(value) === 'string';
        }


        function randomUserId() {
            return 'usr_' + Array.from({ length: 12 }, () =>
                randomFrom('0123456789abcdef'.split(''))
            ).join('');
        }

        function generateSegments() {
            const numSegments = randomNumber(1, 3);
            const shuffled = SEGMENT_POOL.slice().sort(function () { return Math.random() - 0.5; });
            const selected = shuffled.slice(0, numSegments);
            const segmentMap = {};

            selected.forEach(function (segment) {
                segmentMap[segment.name] = segment.id;
            });

            return {
                tc_data_segmentID: JSON.stringify(segmentMap)
            };
        }

        function generateTcVars() {
            const pageNames = [
                'Vintage Furniture Shop',
                'Antique Chairs Collection',
                'Classic Tables Gallery',
                'Heritage Home Decor',
                'Retro Living Essentials'
            ];
            const productNames = ['Vintage Chair', 'Antique Lamp', 'Classic Table', 'Retro Sofa', 'Heritage Cabinet'];
            const segments = generateSegments();
            const productName = randomFrom(productNames);
            const productPrice = randomNumber(49, 999);

            return {
                env_work: 'prod',
                env_channel: 'web',
                env_language: 'en',
                env_country: randomFrom(['US', 'CA', 'GB', 'FR']),
                env_template: randomFrom(['homepage', 'product', 'category', 'checkout']),

                page_type: randomFrom(['Homepage', 'product_list', 'product_detail', 'checkout']),
                page_name: randomFrom(pageNames),
                page_category_1: 'Furniture',
                page_category_2: 'Vintage',
                page_category_3: '',

                user_id: randomUserId(),
                user_email: 'user' + randomNumber(100, 999) + '@example.com',
                user_type: randomFrom(['new', 'returning', 'guest']),
                user_status: randomFrom(['logged_in', 'anonymous']),

                tc_data_segmentID: segments.tc_data_segmentID,

                product_id: 'SKU_' + randomNumber(10000, 99999),
                product_name: productName,
                product_price: productPrice,
                product_category: randomFrom(['Chairs', 'Tables', 'Lighting', 'Storage', 'Decor']),
                product_quantity: randomNumber(1, 3),
                cart_value: productPrice * randomNumber(1, 3),
                currency: 'USD'
            };
        }

        function storeTcVars(data) {
            if (typeof data !== 'object' || !data) {
                console.error('[Commanders Act] Invalid tc_vars data.');
                return;
            }
            try {
                localStorage.setItem(CA_STORAGE_KEY, JSON.stringify(data));
            } catch (error) {
                console.error('[Commanders Act] Error storing tc_vars:', error);
            }
        }

        function applyTcVars(data) {
            let segmentJson = toSegmentJsonString(data.tc_data_segmentID);

            if (!segmentJson) {
                console.warn('[Commanders Act] Invalid tc_data_segmentID, regenerating tc_vars.');
                data = generateTcVars();
                storeTcVars(data);
                segmentJson = data.tc_data_segmentID;
            }

            window.tc_vars = Object.assign({}, window.tc_vars || {}, data, {
                tc_data_segmentID: segmentJson
            });

            console.log('[Commanders Act] tc_data_segmentID type:', typeof window.tc_vars.tc_data_segmentID);
            console.log('[Commanders Act] tc_data_segmentID value:', window.tc_vars.tc_data_segmentID);
        }

        (function initCommandersActDataLayer() {
            const params = new URLSearchParams(window.location.search);
            if (params.get('reset') === '1') {
                localStorage.removeItem('_commandersActVars');
                localStorage.removeItem('_commandersActVars_v2');
                localStorage.removeItem('_commandersActVars_v3');
                localStorage.removeItem('_commandersActVars_v4');
                localStorage.removeItem('_commandersActVars_v5');
                localStorage.removeItem(CA_STORAGE_KEY);
            }

            let tcVarsData;
            const existingData = localStorage.getItem(CA_STORAGE_KEY);

            if (existingData) {
                try {
                    tcVarsData = JSON.parse(existingData);
                    if (!isValidSegmentJsonString(tcVarsData.tc_data_segmentID)) {
                        console.warn('[Commanders Act] Stored segment format invalid, regenerating.');
                        tcVarsData = generateTcVars();
                        storeTcVars(tcVarsData);
                    }
                } catch (error) {
                    console.warn('[Commanders Act] Invalid stored tc_vars, regenerating.');
                    tcVarsData = generateTcVars();
                    storeTcVars(tcVarsData);
                }
            } else {
                tcVarsData = generateTcVars();
                storeTcVars(tcVarsData);
            }

            applyTcVars(tcVarsData);
        })();
    </script>
