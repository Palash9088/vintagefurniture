         const delayParam = params.get("delay");
         const delay = parseInt(delayParam, 10);

      }

<script>
(function () {
  const params = new URLSearchParams(window.location.search);

  const accountId = params.get('id');
  const path = params.get('path') || 'tag';

  if (!accountId) {
    console.warn('VWO account id missing in URL');
    return;
  }

  const script = document.createElement('script');
  script.src = `https://edge.wingify.net/${path}/${accountId}.js`;
  script.async = true;

  document.head.appendChild(script);
})();
</script>
