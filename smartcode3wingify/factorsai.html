<script>
(function () {

  var retryCount = 0;
  var maxRetries = 50; // 5 seconds total (50 × 100ms)
  var intervalId;

  function setFactorsData() {

    window.FactorsDataLayer = window.FactorsDataLayer || {};

    // -----------------------------
    // Main Metadata
    // -----------------------------
    window.FactorsDataLayer.last_updated_at = 1772093654;

    // -----------------------------
    // IP Derived Info (Exact Dummy You Shared)
    // -----------------------------
    window.FactorsDataLayer.ip_derived_info = {
      company_employee_range: "500-999",
      company_industry: "Professional Services",
      company_naics_code: "54",
      company_sector: "Industrials",
      company_sic_code: "87",
      company_sub_industry: "Consulting",
      company_annual_revenue_range: "$10M-$50M"
    };

    // -----------------------------
    // Segments (List of JSON format)
    // -----------------------------
    window.FactorsDataLayer.segments = [
      {
        name: "All Users",
        id: "123e4567-e89b-12d3-a456-426614174000"
      },
      {
        name: "Industrial Sectors",
        id: "223e4567-e89b-12d3-a456-426614174001"
      },
      {
        name: "Consulting Companies",
        id: "323e4567-e89b-12d3-a456-426614174002"
      }
    ];

    console.log("FactorsDataLayer initialized:", window.FactorsDataLayer);

    return true;
  }

  function retryUntilSet() {
    retryCount++;

    try {
      var success = setFactorsData();
      if (success || retryCount >= maxRetries) {
        clearInterval(intervalId);
      }
    } catch (e) {
      if (retryCount >= maxRetries) {
        clearInterval(intervalId);
        console.error("Failed to set FactorsDataLayer:", e);
      }
    }
  }

  // First attempt
  retryUntilSet();

  // Retry every 100ms
  intervalId = setInterval(retryUntilSet, 100);

})();
</script>
