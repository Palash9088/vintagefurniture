<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>MRR Integration Explorer</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; background: #F5F5F5; color: #111; font-size: 14px; }
  .wrap { max-width: 1100px; margin: 0 auto; padding: 32px 20px; }

  /* Header */
  .header { margin-bottom: 28px; }
  .header h1 { font-size: 22px; font-weight: 700; color: #111; margin-bottom: 4px; }
  .header p { font-size: 13px; color: #777; }

  /* Stats */
  .stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 28px; }
  @media (max-width: 640px) { .stats { grid-template-columns: repeat(2, 1fr); } }
  .stat { background: #fff; border: 1px solid #E2E2E2; border-radius: 8px; padding: 14px 16px; }
  .stat-value { font-size: 22px; font-weight: 700; color: #111; line-height: 1.2; }
  .stat-label { font-size: 11px; color: #888; margin-top: 4px; text-transform: uppercase; letter-spacing: 0.05em; }

  /* Section label */
  .section-label { font-size: 11px; font-weight: 600; color: #888; text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 10px; }

  /* Range buttons */
  .ranges { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 20px; }
  .range-btn { padding: 6px 13px; border-radius: 6px; font-size: 13px; cursor: pointer; border: 1px solid #D5D5D5; background: #fff; color: #333; font-weight: 400; transition: all 0.12s; }
  .range-btn:hover { border-color: #3685BF; color: #3685BF; }
  .range-btn.active { background: #3685BF; color: #fff; border-color: #3685BF; font-weight: 600; }
  .range-btn .count { opacity: 0.65; font-size: 11px; margin-left: 3px; }

  /* Controls */
  .controls { display: flex; gap: 12px; margin-bottom: 20px; flex-wrap: wrap; }
  .search-input { flex: 1 1 240px; padding: 8px 12px; font-size: 13px; border-radius: 6px; border: 1px solid #D5D5D5; background: #fff; color: #111; outline: none; }
  .search-input:focus { border-color: #3685BF; }
  .size-select { flex: 0 0 160px; padding: 8px 12px; font-size: 13px; border-radius: 6px; border: 1px solid #D5D5D5; background: #fff; color: #333; outline: none; cursor: pointer; }

  /* Toolbar */
  .toolbar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; flex-wrap: wrap; gap: 8px; }
  .toolbar-count { font-size: 13px; color: #555; }
  .toolbar-count strong { color: #111; }
  .sort-group { display: flex; align-items: center; gap: 6px; }
  .sort-label { font-size: 12px; color: #999; }
  .sort-btn { padding: 4px 10px; border-radius: 5px; font-size: 12px; cursor: pointer; border: 1px solid #D5D5D5; background: #fff; color: #555; font-weight: 400; }
  .sort-btn.active { background: #F0F0F0; color: #111; font-weight: 600; }

  /* Account list */
  .account-list { display: flex; flex-direction: column; gap: 8px; }
  .account-card { background: #fff; border: 1px solid #E4E4E4; border-radius: 8px; overflow: hidden; }
  .account-row { display: flex; align-items: center; justify-content: space-between; padding: 13px 16px; gap: 12px; cursor: pointer; }
  .account-row:hover { background: #FAFAFA; }
  .account-info { flex: 1; min-width: 0; }
  .account-name { font-size: 14px; font-weight: 600; color: #111; }
  .account-meta { display: flex; align-items: center; gap: 8px; margin-top: 3px; flex-wrap: wrap; }
  .account-id { font-size: 11px; color: #aaa; }
  .size-badge { font-size: 11px; background: #F0F0F0; color: #555; border-radius: 4px; padding: 2px 7px; }
  .account-right { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
  .mrr-badge { font-size: 12px; font-weight: 600; border-radius: 5px; padding: 3px 9px; }
  .mrr-high  { color: #C05A28; background: #FFF0EB; }
  .mrr-mid   { color: #B07B10; background: #FFFBE6; }
  .mrr-low   { color: #1A7A4A; background: #EDF7F2; }
  .int-badge { font-size: 11px; color: #777; background: #F5F5F5; border-radius: 5px; padding: 3px 8px; }
  .toggle-btn { padding: 4px 10px; font-size: 12px; border-radius: 5px; cursor: pointer; border: 1px solid #D5D5D5; background: #fff; color: #444; }
  .toggle-btn:hover { background: #F0F0F0; }

  /* Expanded */
  .account-detail { border-top: 1px solid #EBEBEB; padding: 14px 16px; background: #FAFAFA; display: none; }
  .account-detail.open { display: block; }
  .detail-meta { display: flex; gap: 20px; margin-bottom: 12px; flex-wrap: wrap; }
  .detail-meta span { font-size: 12px; color: #666; }
  .detail-meta strong { color: #333; }
  .int-table { width: 100%; border-collapse: collapse; font-size: 13px; }
  .int-table th { padding: 7px 10px; text-align: left; font-size: 11px; font-weight: 600; color: #888; text-transform: uppercase; letter-spacing: 0.05em; background: #EFEFEF; }
  .int-table td { padding: 7px 10px; }
  .int-table tr:nth-child(even) td { background: #F7F7F7; }
  .int-table .td-id { color: #bbb; width: 80px; font-size: 12px; }
  .int-table .td-name { color: #222; font-weight: 500; }

  /* Pagination */
  .pagination { display: flex; justify-content: center; align-items: center; gap: 10px; margin-top: 24px; }
  .page-btn { padding: 7px 18px; border-radius: 6px; border: 1px solid #D5D5D5; background: #fff; color: #444; font-size: 13px; cursor: pointer; }
  .page-btn:hover:not(:disabled) { background: #F5F5F5; }
  .page-btn:disabled { opacity: 0.35; cursor: not-allowed; }
  .page-info { font-size: 13px; color: #666; min-width: 80px; text-align: center; }

  /* Empty */
  .empty { text-align: center; padding: 48px 0; color: #aaa; font-size: 14px; }
</style>
</head>
<body>
<div class="wrap">
  <div class="header">
    <h1>MRR Integration Explorer</h1>
    <p id="subtitle"></p>
  </div>

  <div class="stats">
    <div class="stat"><div class="stat-value" id="s-total"></div><div class="stat-label">Total Accounts</div></div>
    <div class="stat"><div class="stat-value" id="s-filtered"></div><div class="stat-label">In View</div></div>
    <div class="stat"><div class="stat-value" id="s-avg"></div><div class="stat-label">Avg MRR (filtered)</div></div>
    <div class="stat"><div class="stat-value" id="s-ints"></div><div class="stat-label">Integrations in View</div></div>
  </div>

  <div class="section-label">Filter by MRR Range</div>
  <div class="ranges" id="ranges"></div>

  <div class="controls">
    <input class="search-input" id="search" type="text" placeholder="Search by account name, ID, or integration..."/>
    <select class="size-select" id="size-filter"></select>
  </div>

  <div class="toolbar">
    <div class="toolbar-count" id="toolbar-count"></div>
    <div class="sort-group">
      <span class="sort-label">Sort:</span>
      <button class="sort-btn active" data-field="mrr">MRR</button>
      <button class="sort-btn" data-field="integrations">Integrations</button>
      <button class="sort-btn" data-field="name">Name</button>
    </div>
  </div>

  <div class="account-list" id="account-list"></div>
  <div class="pagination" id="pagination"></div>
</div>

const MRR_RANGES = [
  { label: 'All', min: 0, max: Infinity },
  { label: '< $500', min: 0, max: 500 },
  { label: '$500–$1K', min: 500, max: 1000 },
  { label: '$1K–$2K', min: 1000, max: 2000 },
  { label: '$2K–$3K', min: 2000, max: 3000 },
  { label: '$3K–$5K', min: 3000, max: 5000 },
  { label: '$5K–$10K', min: 5000, max: 10000 },
  { label: '> $10K', min: 10000, max: Infinity },
];

let rangeIdx = 0, search = '', sizeFilter = 'All';
let sortField = 'mrr', sortDir = 'desc';
let page = 0;
const PAGE_SIZE = 20;
let expandedId = null;

function fmt(n) { return '$' + Math.round(n).toLocaleString('en-US'); }
function mrrBucket(mrr) {
  if (mrr < 500) return '< $500';
  if (mrr < 1000) return '$500–$1K';
  if (mrr < 2000) return '$1K–$2K';
  if (mrr < 3000) return '$2K–$3K';
  if (mrr < 5000) return '$3K–$5K';
  if (mrr < 10000) return '$5K–$10K';
  return '> $10K';
}
function mrrClass(mrr) {
  if (mrr >= 5000) return 'mrr-high';
  if (mrr >= 2000) return 'mrr-mid';
  return 'mrr-low';
}

// Sizes
const sizes = ['All', ...Array.from(new Set(RAW_DATA.map(a => a.size))).sort()];
const sizeEl = document.getElementById('size-filter');
sizes.forEach(s => {
  const o = document.createElement('option');
  o.value = s; o.textContent = s;
  sizeEl.appendChild(o);
});
sizeEl.addEventListener('change', () => { sizeFilter = sizeEl.value; page = 0; render(); });

// Range buttons
const rangesEl = document.getElementById('ranges');
MRR_RANGES.forEach((r, i) => {
  const count = i === 0 ? RAW_DATA.length : RAW_DATA.filter(a => a.mrr >= r.min && a.mrr < r.max).length;
  const btn = document.createElement('button');
  btn.className = 'range-btn' + (i === 0 ? ' active' : '');
  btn.innerHTML = r.label + ' <span class="count">' + count + '</span>';
  btn.addEventListener('click', () => { rangeIdx = i; page = 0; document.querySelectorAll('.range-btn').forEach((b,j) => b.classList.toggle('active', j===i)); render(); });
  rangesEl.appendChild(btn);
});

// Search
document.getElementById('search').addEventListener('input', e => { search = e.target.value; page = 0; render(); });

// Sort
document.querySelectorAll('.sort-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    const f = btn.dataset.field;
    if (sortField === f) sortDir = sortDir === 'asc' ? 'desc' : 'asc';
    else { sortField = f; sortDir = f === 'name' ? 'asc' : 'desc'; }
    document.querySelectorAll('.sort-btn').forEach(b => b.classList.toggle('active', b.dataset.field === sortField));
    page = 0; render();
  });
});

function getFiltered() {
  const range = MRR_RANGES[rangeIdx];
  const q = search.toLowerCase().trim();
  return RAW_DATA
    .filter(a => a.mrr >= range.min && a.mrr < range.max)
    .filter(a => sizeFilter === 'All' || a.size === sizeFilter)
    .filter(a => !q || a.name.toLowerCase().includes(q) || a.id.includes(q) || a.integrations.some(i => i.name.toLowerCase().includes(q)));
}

function getSorted(list) {
  return [...list].sort((a, b) => {
    if (sortField === 'mrr') return sortDir === 'asc' ? a.mrr - b.mrr : b.mrr - a.mrr;
    if (sortField === 'integrations') return sortDir === 'asc' ? a.integrations.length - b.integrations.length : b.integrations.length - a.integrations.length;
    return sortDir === 'asc' ? a.name.localeCompare(b.name) : b.name.localeCompare(a.name);
  });
}

function renderAccounts(list) {
  const el = document.getElementById('account-list');
  if (list.length === 0) { el.innerHTML = '<div class="empty">No accounts match your filters.</div>'; return; }
  el.innerHTML = '';
  list.forEach(account => {
    const card = document.createElement('div');
    card.className = 'account-card';

    const row = document.createElement('div');
    row.className = 'account-row';
    row.innerHTML = `
      <div class="account-info">
        <div class="account-name">${account.name}</div>
        <div class="account-meta">
          <span class="account-id">ID: ${account.id}</span>
          <span class="size-badge">${account.size}</span>
        </div>
      </div>
      <div class="account-right">
        <span class="mrr-badge ${mrrClass(account.mrr)}">${fmt(account.mrr)}/mo</span>
        <span class="int-badge">${account.integrations.length} integration${account.integrations.length !== 1 ? 's' : ''}</span>
        <button class="toggle-btn" data-id="${account.id}">${expandedId === account.id ? 'Close' : 'View'}</button>
      </div>
    `;

    const detail = document.createElement('div');
    detail.className = 'account-detail' + (expandedId === account.id ? ' open' : '');
    detail.innerHTML = `
      <div class="detail-meta">
        <span>Plan: <strong>${account.plan}</strong></span>
        <span>Status: <strong>${account.status}</strong></span>
        <span>MRR Range: <strong>${mrrBucket(account.mrr)}</strong></span>
      </div>
      <table class="int-table">
        <thead><tr><th>ID</th><th>Integration Name</th></tr></thead>
        <tbody>
          ${account.integrations.map((intg, idx) => `<tr><td class="td-id">${intg.id}</td><td class="td-name">${intg.name}</td></tr>`).join('')}
        </tbody>
      </table>
    `;

    row.querySelector('.toggle-btn').addEventListener('click', (e) => {
      e.stopPropagation();
      expandedId = expandedId === account.id ? null : account.id;
      render();
    });
    row.addEventListener('click', () => {
      expandedId = expandedId === account.id ? null : account.id;
      render();
    });

    card.appendChild(row);
    card.appendChild(detail);
    el.appendChild(card);
  });
}

function renderPagination(total) {
  const totalPages = Math.ceil(total / PAGE_SIZE);
  const el = document.getElementById('pagination');
  if (totalPages <= 1) { el.innerHTML = ''; return; }
  el.innerHTML = `
    <button class="page-btn" id="prev-btn" ${page === 0 ? 'disabled' : ''}>Previous</button>
    <span class="page-info">Page ${page + 1} of ${totalPages}</span>
    <button class="page-btn" id="next-btn" ${page >= totalPages - 1 ? 'disabled' : ''}>Next</button>
  `;
  document.getElementById('prev-btn')?.addEventListener('click', () => { page = Math.max(0, page - 1); render(); });
  document.getElementById('next-btn')?.addEventListener('click', () => { page = Math.min(totalPages - 1, page + 1); render(); });
}

function render() {
  const filtered = getFiltered();
  const sorted = getSorted(filtered);
  const paginated = sorted.slice(page * PAGE_SIZE, (page + 1) * PAGE_SIZE);

  document.getElementById('subtitle').textContent = RAW_DATA.length + ' paid accounts with MRR data';
  document.getElementById('s-total').textContent = RAW_DATA.length.toLocaleString();
  document.getElementById('s-filtered').textContent = filtered.length.toLocaleString();
  const avg = filtered.length ? filtered.reduce((s,a) => s + a.mrr, 0) / filtered.length : 0;
  document.getElementById('s-avg').textContent = fmt(avg);
  const totalInts = filtered.reduce((s,a) => s + a.integrations.length, 0);
  document.getElementById('s-ints').textContent = totalInts.toLocaleString();

  const arrow = f => sortField === f ? (sortDir === 'asc' ? ' ↑' : ' ↓') : '';
  document.querySelectorAll('.sort-btn').forEach(b => {
    b.textContent = (b.dataset.field === 'mrr' ? 'MRR' : b.dataset.field === 'integrations' ? 'Integrations' : 'Name') + arrow(b.dataset.field);
    b.classList.toggle('active', b.dataset.field === sortField);
  });

  document.getElementById('toolbar-count').innerHTML = '<strong>' + filtered.length + '</strong> account' + (filtered.length !== 1 ? 's' : '') + ' &nbsp;&middot;&nbsp; Page ' + (page + 1) + ' of ' + (Math.ceil(filtered.length / PAGE_SIZE) || 1);

  renderAccounts(paginated);
  renderPagination(filtered.length);
}

render();
</script>
