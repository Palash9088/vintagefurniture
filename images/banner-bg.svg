    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#1a73e8" stop-opacity="0.35"/>
      <stop offset="50%" stop-color="#7b1fa2" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#2e7d32" stop-opacity="0.3"/>
