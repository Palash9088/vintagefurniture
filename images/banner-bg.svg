<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 400" width="1920" height="400">
  <defs>
    <linearGradient id="wood" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3d2b1f"/>
      <stop offset="35%" stop-color="#6b4423"/>
      <stop offset="70%" stop-color="#8b5a2b"/>
      <stop offset="100%" stop-color="#2c1810"/>
